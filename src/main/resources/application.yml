spring:
  application:
    name: CESIZen
  jackson:
    time-zone: UTC
  cloud:
    vault:
      host: ${VAULT_HOST}
      port: ${VAULT_PORT}
      scheme: ${VAULT_SCHEME}
      authentication: token
      token: ${VAULT_TOKEN}
      kv:
        enabled: true
        backend: secret
        default-context: ${default_context_vault}
  datasource:
    url: ${url_db}
    username: ${username_db}
    password: ${password_db}
    driver-class-name: org.postgresql.Driver
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${mail_username}
    password: ${mail_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          debug: true
  server:
    port: 8080
    address: 0.0.0.0
    forward-headers-strategy: framework

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  profiles:
    active: local

jwt:
  secret-reset: ${jwt_secret_reset}
  secret-key: ${jwt_secret_key}
  expiration-time: 3600000

server:
  port: 8080

logging:
  level:
    org.springframework.cloud.vault: DEBUG
    org.springframework.vault: DEBUG

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: ${url_db}
    username: ${username_db}
    password: ${password_db}