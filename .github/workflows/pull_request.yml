name: Pull Request

on:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # 🐘 DB de test pour Spring Boot
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cesizen_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      # 📥 Code
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ☕ Java 21
      - name: Configurer Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # 🧪 Tests + build + coverage
      - name: Build + tests Maven
        run: mvn clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/cesizen_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

      # 📊 SonarQube
      - name: Analyse SonarQube
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=CESIZen \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      # 🐳 Build Docker image de l’API
      - name: Build Docker image
        run: |
          docker build -t cesizen-api:${{ github.sha }} .

      # 🧪 Test container API (smoke test)
      - name: Run API container
        run: |
          docker run -d -p 8080:8080 --name api cesizen-api:${{ github.sha }}

          echo "Waiting API startup..."
          for i in {1..15}; do
            curl --fail http://localhost:8080/actuator/health && break
            echo "waiting..."
            sleep 3
          done

          docker logs api